# SnapForge — Configuration
# Copiez ce fichier en config.yaml et adaptez à votre installation.

app:
  booth_name: "SnapForge"          # Nom affiché sur l'écran d'accueil (ligne 1)
  booth_name_size: 0               # Taille police ligne 1 (0 = auto)
  booth_subtitle: ""               # Deuxième ligne du titre (vide = "Bienvenue !")
  booth_subtitle_size: 0           # Taille police ligne 2 (0 = auto)
  fullscreen: true
  # Paysage 800x480 (défaut) ou portrait 480x800 selon votre écran
  # L'interface s'adapte automatiquement selon le ratio largeur/hauteur
  width: 800
  height: 480
  fps: 30
  font_path: assets/fonts/Roboto-Regular.ttf

event:
  title: "Mon Événement"
  description: "Votre description ici"
  title_font_size: 69          # Taille police titre (28-120 pt)
  description_font_size: 35    # Taille police description (12-80 pt)

photos:
  option_a: 1                      # Première option proposée (1-4)
  option_b: 4                      # Deuxième option proposée (1-4)
  raw_dir: Photo/raw
  final_dir: Photo/final

session:
  countdown_seconds: 3             # Délai avant chaque capture
  inactivity_timeout_seconds: 10   # Retour accueil si aucune action (0 = désactivé)

camera:
  resolution_width: 3280
  resolution_height: 2464
  preview_width: 640   # doit avoir le même ratio que resolution_width/height (4:3) pour un FOV identique preview/photo
  preview_height: 480
  flash_pre_delay: 0.15          # Délai (s) entre allumage flash et déclenchement (0 = simultané)
  rotation: 0
  flip_horizontal: true
  flip_vertical: false
  # --- ISP qualité image ---
  # Netteté : libcamera est TRÈS doux par défaut (1.0). Le stack legacy (pibooth/raspistill)
  # accentue fortement dans le firmware -> monter à 2.0-4.0 pour un piqué équivalent.
  sharpness: 2.5               # Netteté    (0.0-16.0, 1.0 = neutre/doux, 2.5 = piqué type legacy)
  contrast: 1.1                # Contraste  (0.5-2.0,  1.0 = neutre, 1.1 = léger punch)
  saturation: 1.0              # Saturation (0.0-2.0,  1.0 = défaut)
  brightness: 0.0              # Luminosité (-1.0 à 1.0, 0.0 = neutre)
  exposure_value: 0.0          # Compensation EV (-4.0 à 4.0, 0.0 = aucune)
  noise_reduction_mode: 1      # Débruitage ISP : 0=désactivé 1=rapide 2=haute qualité
  # --- Verrouillage AE/AWB avant capture ---
  ae_lock_before_capture: false # true = récupère expo+balance des blancs de la preview
                                # Recommandé si flash continu (lumière stable pendant preview)
                                # Désactiver si flash photo (flash absent en preview → surexposition)
  ae_lock_delay: 0.2           # Délai (s) après verrouillage (l'ISP applique les valeurs)
  # --- Rotation portrait ---
  portrait_rotation: 0         # Angle de rotation (°) des brutes quand template portrait + caméra paysage (90 ou 270)
  flash_enabled: true          # Activer le flash pour les captures
  flash_mode: "continu"        # "photo" = flash par prise | "continu" = allumé depuis le décompte
  # --- Exposition manuelle ---
  manual_exposure: false       # true = désactive l'AE auto et fixe les valeurs ci-dessous
  exposure_time_us: 100000     # Temps d'exposition en µs (100000 = 1/10s, 20000 = 1/50s)
  analogue_gain: 1.0           # Gain analogique (1.0 ≈ ISO 100, 2.0 ≈ ISO 200, 4.0 ≈ ISO 400)

gpio:
  enabled: true
  photo_button_pin: 11
  photo_led_pin: 7
  print_button_pin: 13
  print_led_pin: 15
  startup_led_pin: 29
  sequence_led_pin: 31
  flash_led_pin: 33
  button_bounce_time: 0.05         # Anti-rebond 50ms (réduit pour réactivité)

templates:
  # Template utilisé selon le nombre de photos capturées
  photo_1: portrait_1photo
  photo_2: portrait_1photo
  photo_3: portrait_1photo
  photo_4: landscape_4photos
  default: portrait_1photo
  templates_dir: templates

processing:
  jpeg_quality: 97
  output_scale: 1.0    # Agrandissement du rendu final. 1.0 = dimensions template (~400dpi, la photo est RÉDUITE dans le slot = NET). >1.0 suréchantillonne au-delà du détail capteur ET de l'imprimante (Canon SELPHY = 300dpi) => RAMOLLIT. Laisser 1.0.
  output_dpi: 300      # Métadonnée DPI inscrite dans le JPEG (300 = print-ready pour SELPHY)
  usm_enabled: true    # Unsharp Mask après redimensionnement (restaure la netteté perdue au resize)
  usm_radius: 1.0      # Rayon USM en pixels (0.5-2.0)
  usm_percent: 120     # Intensité USM en % (80-200 — valeurs élevées amplifient le grain/halos)
  usm_threshold: 6     # Seuil USM — ignore les zones sous ce contraste (3-10, plus élevé = moins de grain)
  # --- Rendu "punchy" type legacy/pibooth (mesuré : libcamera laisse noirs délavés + dominante verte) ---
  black_point: 8       # Écrase les noirs délavés : remappe [bp,255]->[0,255]. 0 = désactivé. ~8 mesuré vs pibooth.
  wb_gains: [1.22, 1.0, 1.05]  # Correction couleur [R,G,B] : compense la dominante vert/froid de libcamera. [1,1,1] ou vide = aucune.
  final_width: 1800    # Utilisé uniquement sans template (mode auto)
  final_height: 1200   # Utilisé uniquement sans template (mode auto)
  font_path: assets/fonts/AmaticSC-Bold.ttf  # Police pour les textes sur la photo finale (titre/description)

ai:
  enabled: false
  provider: rembg
  background_path: assets/backgrounds/default_bg.jpg
  apply_on: raw_photo
  removebg_api_key: ""

gif:
  enabled: true              # Afficher le bouton "GIF ANIMÉ" sur l'écran de choix
  frames_count: 6            # Nombre d'images capturées
  delay_between_frames_seconds: 1.0  # Délai entre deux captures (secondes)
  frame_duration_ms: 180     # Durée d'affichage de chaque frame dans le GIF (ms)
  loop: 0                    # 0 = boucle infinie
  resize_width: 720          # Largeur max du GIF (pour limiter le poids)
  apply_template: false      # Appliquer le template sur chaque frame (expérimental)
  upload_enabled: true       # Uploader le GIF vers le cloud
  show_qrcode: true          # Afficher le QR code du GIF
  output_dir: Photo/gifs
  thumbnails_dir: Photo/thumbnails

plugins:
  qr_on_result: true               # Afficher QR code après la photo

home_carousel:
  enabled: true
  animate_gifs: true         # Animer les GIF dans le carrousel
  max_animated_gifs: 2       # Max de GIF animés simultanément (perf Pi)                    # Carrousel de photos sur l'écran d'accueil
  mode: "table"                    # "table" (photos éparses) ou "simple" (une à la fois)
  interval_seconds: 4              # Délai entre les changements de photo
  max_photos_displayed: 5          # Nombre max de photos visibles (mode table)

usb_export:
  enabled: false             # Activer l'export USB (bouton GPIO PIN 16)
  button_pin: 16             # PIN BOARD du bouton export USB

printing:
  enabled: false
  printer_name: ""
  copies: 1
  dpi: 300

cloud:
  # Provider recommandé : cloudflare — URLs publiques, gratuit jusqu'à 10 Go
  # Guide complet : docs/CONFIGURATION_CLOUDFLARE_R2.md
  enabled: false             # Mettre à true pour activer l'upload
  provider: cloudflare       # cloudflare (recommandé) | google_photos | local
  retry_on_failure: true
  retry_queue_file: Photo/upload_queue.json

  cloudflare:
    account_id:       ""     # Dashboard Cloudflare → colonne droite
    api_token:        ""     # Profil → API Tokens → Create Token (R2 Storage Edit)
    bucket_name:      ""     # Nom du bucket R2 créé (ex: snapforge)
    public_url_base:  ""     # https://pub-XXXX.r2.dev (settings du bucket)

  # Google Photos : archivage personnel uniquement — URLs NON publiques
  # Guide : docs/CONFIGURATION_GOOGLE_PHOTOS.md
  google_photos:
    credentials_file: credentials/google_credentials.json
    album_name: SnapForge

  local:
    output_dir: Photo/exported

qr:
  enabled: true
  # Avec Cloudflare R2 : mettre l'URL publique du bucket
  # Avec nginx local   : mettre http://IP_DU_PI/photos
  base_url: "https://pub-XXXX.r2.dev"
  # true  = QR pointe vers l'URL cloud (Cloudflare R2 → public ✓)
  # false = QR pointe vers base_url + filename (nginx local ou fallback)
  # ⚠️ JAMAIS true avec Google Photos (URLs privées → 403 pour les invités)
  use_upload_url: true
  size: 300
  display_duration: 15

logging:
  level: INFO
  file: logs/snapforge.log
  max_size_mb: 10
  backup_count: 3
